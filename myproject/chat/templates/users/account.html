{% extends 'flatpages/default.html' %}

{% block content %}
<h1>Your account</h1>
<hr>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{user.username}} <p>
    {% if user.photo %}
    <img class="circle" src="{{ user.photo.url }}"/>
    {% else %}
    <p> <img src="media/default.jpeg">
    {% endif %}

</form>
{% endblock content %}
